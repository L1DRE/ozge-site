<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTC Reels Cover Generator — Team OZGE 34350</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a3a6b;
    --navy-dark: #0f2347;
    --gold: #c9a227;
    --gold-light: #e8c44a;
    --orange: #e8650a;
    --white: #ffffff;
    --bg: #0a0f1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    padding: 24px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid rgba(201,162,39,.25);
    background: rgba(10,15,30,.85);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo-badge {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--orange), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; color: #fff;
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--gold-light);
  }
  header p { font-size: 13px; color: rgba(255,255,255,.5); }

  /* ── LAYOUT ── */
  .workspace {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 40px;
    padding: 40px;
    width: 100%;
    max-width: 1300px;
    align-items: start;
  }

  /* ── PANEL ── */
  .panel {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(201,162,39,.2);
    border-radius: 16px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    border-bottom: 1px solid rgba(201,162,39,.2);
    padding-bottom: 8px;
  }
  .field { display: flex; flex-direction: column; gap: 8px; }
  label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,.6);
  }
  input[type=text], textarea, select {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px;
    color: #fff;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .2s, background .2s;
    width: 100%;
  }
  input[type=text]:focus, textarea:focus, select:focus {
    border-color: var(--gold);
    background: rgba(201,162,39,.08);
  }
  textarea { resize: vertical; min-height: 70px; }
  select option { background: #1a2a4a; }

  input[type=color] {
    width: 48px; height: 36px; border: 2px solid rgba(255,255,255,.2);
    border-radius: 8px; cursor: pointer; padding: 2px; background: transparent;
  }
  .color-row { display: flex; align-items: center; gap: 12px; }
  .color-row input[type=text] { flex: 1; }

  /* file upload */
  .upload-zone {
    border: 2px dashed rgba(201,162,39,.35);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover { border-color: var(--gold); background: rgba(201,162,39,.06); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .upload-zone p { font-size: 13px; color: rgba(255,255,255,.5); }
  .upload-zone.has-file { border-color: var(--gold); background: rgba(201,162,39,.1); }
  .upload-zone.has-file p { color: var(--gold); }

  /* template buttons */
  .templates {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .tpl-btn {
    padding: 10px 8px;
    border-radius: 10px;
    border: 2px solid transparent;
    background: rgba(255,255,255,.06);
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .tpl-btn:hover { border-color: var(--gold-light); }
  .tpl-btn.active { border-color: var(--gold); background: rgba(201,162,39,.12); }
  .tpl-btn .tpl-icon { font-size: 22px; }
  .tpl-btn .tpl-name { font-size: 11px; font-weight: 600; letter-spacing: 1px; color: rgba(255,255,255,.7); margin-top: 4px; }

  /* action buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 24px;
    border-radius: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; border: none; transition: all .2s;
    width: 100%; justify-content: center;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--orange));
    color: #fff;
    box-shadow: 0 4px 20px rgba(201,162,39,.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(201,162,39,.5); }
  .btn-secondary {
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.15);
    color: rgba(255,255,255,.8);
  }
  .btn-secondary:hover { background: rgba(255,255,255,.12); }

  /* ── PREVIEW AREA ── */
  .preview-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 100px;
  }
  .preview-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,.35);
  }
  .canvas-wrapper {
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(201,162,39,.2);
    position: relative;
  }
  canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }
  .preview-actions {
    display: flex; gap: 12px; width: 100%;
    max-width: 360px;
  }

  /* range slider */
  input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 4px;
    background: rgba(255,255,255,.1);
    border-radius: 4px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .range-row { display: flex; align-items: center; gap: 12px; }
  .range-val {
    font-size: 13px; font-weight: 700;
    color: var(--gold-light); min-width: 32px; text-align: right;
  }

  /* toggle */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .toggle {
    position: relative; width: 46px; height: 24px;
  }
  .toggle input { display: none; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: rgba(255,255,255,.1);
    border-radius: 24px;
    cursor: pointer; transition: .2s;
  }
  .toggle-slider::before {
    content: ''; position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: #fff; border-radius: 50%;
    transition: .2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--gold); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(22px); }

  /* notification */
  .toast {
    position: fixed; bottom: 30px; right: 30px;
    background: var(--gold);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; letter-spacing: 1px;
    padding: 12px 24px; border-radius: 12px;
    font-size: 14px;
    transform: translateY(80px); opacity: 0;
    transition: all .3s;
    z-index: 1000;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 900px) {
    .workspace { grid-template-columns: 1fr; padding: 20px; }
    .preview-area { position: static; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-badge">FTC</div>
  <div>
    <h1>Reels Cover Generator</h1>
    <p>Team OZGE · FTC 34350</p>
  </div>
</header>

<div class="workspace">

  <!-- ── LEFT PANEL ── -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <!-- Templates -->
    <div class="panel">
      <div class="section-title">Шаблон</div>
      <div class="templates">
        <div class="tpl-btn active" onclick="setTemplate('partner')" id="tpl-partner">
          <div class="tpl-icon">🤝</div>
          <div class="tpl-name">Meet Partner</div>
        </div>
        <div class="tpl-btn" onclick="setTemplate('robot')" id="tpl-robot">
          <div class="tpl-icon">🤖</div>
          <div class="tpl-name">Робот</div>
        </div>
        <div class="tpl-btn" onclick="setTemplate('event')" id="tpl-event">
          <div class="tpl-icon">🏆</div>
          <div class="tpl-name">Событие</div>
        </div>
        <div class="tpl-btn" onclick="setTemplate('team')" id="tpl-team">
          <div class="tpl-icon">👥</div>
          <div class="tpl-name">Команда</div>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="panel">
      <div class="section-title">Контент</div>

      <div class="field">
        <label>Заголовок (белый)</label>
        <input type="text" id="title1" value="MEET OUR" oninput="render()">
      </div>
      <div class="field">
        <label>Заголовок 2 (белый)</label>
        <input type="text" id="title2" value="PARTNER:" oninput="render()">
      </div>
      <div class="field">
        <label>Акцент / имя партнёра (оранжевый)</label>
        <input type="text" id="accent" value="[PARTNER NAME]" oninput="render()">
      </div>
      <div class="field">
        <label>Имя команды</label>
        <input type="text" id="teamName" value="TEAM: OZGE" oninput="render()">
      </div>
      <div class="field">
        <label>Номер команды</label>
        <input type="text" id="teamNum" value="FTC TEAM 34350" oninput="render()">
      </div>
      <div class="field">
        <label>Нижний текст (опционально)</label>
        <input type="text" id="subtext" value="FIRST TECH APPRECIATION" oninput="render()">
      </div>
    </div>

    <!-- Logo upload -->
    <div class="panel">
      <div class="section-title">Логотип спонсора</div>
      <div class="upload-zone" id="logoZone">
        <input type="file" id="logoFile" accept="image/*" onchange="loadLogo(event)">
        <div class="upload-icon">📁</div>
        <p id="logoLabel">Нажмите или перетащите логотип</p>
      </div>
      <div class="toggle-row">
        <label style="text-transform:none;font-size:13px;letter-spacing:0;">Показать рамку логотипа</label>
        <label class="toggle">
          <input type="checkbox" id="showLogoBox" checked onchange="render()">
          <div class="toggle-slider"></div>
        </label>
      </div>
      <div class="field">
        <label>Размер логотипа</label>
        <div class="range-row">
          <input type="range" id="logoSize" min="30" max="100" value="70" oninput="render();this.nextElementSibling.textContent=this.value+'%'">
          <span class="range-val">70%</span>
        </div>
      </div>
    </div>

    <!-- Style -->
    <div class="panel">
      <div class="section-title">Стиль</div>
      <div class="field">
        <label>Цвет фона</label>
        <div class="color-row">
          <input type="color" id="bgColor" value="#1a3a6b" oninput="syncColor(this,'bgColorHex')">
          <input type="text" id="bgColorHex" value="#1a3a6b" oninput="syncHex(this,'bgColor')">
        </div>
      </div>
      <div class="field">
        <label>Акцентный цвет</label>
        <div class="color-row">
          <input type="color" id="accentColor" value="#e8650a" oninput="syncColor(this,'accentColorHex')">
          <input type="text" id="accentColorHex" value="#e8650a" oninput="syncHex(this,'accentColor')">
        </div>
      </div>
      <div class="field">
        <label>Цвет рамки</label>
        <div class="color-row">
          <input type="color" id="frameColor" value="#c9a227" oninput="syncColor(this,'frameColorHex')">
          <input type="text" id="frameColorHex" value="#c9a227" oninput="syncHex(this,'frameColor')">
        </div>
      </div>
      <div class="toggle-row">
        <label style="text-transform:none;font-size:13px;letter-spacing:0;">Геометрические декоры</label>
        <label class="toggle">
          <input type="checkbox" id="showDecor" checked onchange="render()">
          <div class="toggle-slider"></div>
        </label>
      </div>
    </div>

    <!-- Buttons -->
    <button class="btn btn-secondary" onclick="resetForm()">↺ Сбросить</button>
  </div>

  <!-- ── RIGHT: PREVIEW ── -->
  <div class="preview-area">
    <div class="preview-label">Предпросмотр · 1080 × 1920</div>
    <div class="canvas-wrapper">
      <canvas id="cvs" width="1080" height="1920" style="width:360px;height:640px;"></canvas>
    </div>
    <div class="preview-actions">
      <button class="btn btn-primary" onclick="downloadPNG()" style="flex:1;">⬇ Скачать PNG</button>
    </div>
  </div>

</div>

<div class="toast" id="toast">✓ Файл сохранён!</div>

/* ── helpers ── */
function g(id){ return document.getElementById(id); }
function val(id){ return g(id).value; }
function checked(id){ return g(id).checked; }

function syncColor(el, hexId){
  g(hexId).value = el.value;
  render();
}
function syncHex(el, colorId){
  const v = el.value;
  if(/^#[0-9a-fA-F]{6}$/.test(v)){ g(colorId).value = v; render(); }
}

function hexToRgb(hex){
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? { r: parseInt(r[1],16), g: parseInt(r[2],16), b: parseInt(r[3],16) } : {r:26,g:58,b:107};
}

/* ── logo load ── */
function loadLogo(e){
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { logoImg = img; render(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
  g('logoZone').classList.add('has-file');
  g('logoLabel').textContent = '✓ ' + f.name;
}

/* ── MAIN RENDER ── */
function render(){
  const W = 1080, H = 1920;
  const bg = val('bgColor');
  const acc = val('accentColor');
  const frame = val('frameColor');
  const decor = checked('showDecor');

  ctx.clearRect(0,0,W,H);

  // Background gradient
  const bgRgb = hexToRgb(bg);
  const grd = ctx.createLinearGradient(0,0,W,H);
  grd.addColorStop(0, bg);
  grd.addColorStop(1, `rgb(${Math.max(0,bgRgb.r-30)},${Math.max(0,bgRgb.g-30)},${Math.max(0,bgRgb.b-20)})`);
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  // Subtle noise overlay
  drawNoise();

  if(decor) drawDecorations(W, H, acc, frame);

  // Outer gold double frame
  drawDoubleFrame(W, H, frame);

  // Inner content frame
  drawContentFrame(W, H, frame);

  // Text
  drawTexts(W, H, acc);

  // Logo area
  drawLogoArea(W, H, frame);

  // FIRST logo
  drawFirstLogo(W, H);
}

function drawNoise(){
  const id = ctx.getImageData(0,0,1080,1920);
  const d = id.data;
  for(let i=0;i<d.length;i+=4){
    const n = (Math.random()-0.5)*12;
    d[i]+=n; d[i+1]+=n; d[i+2]+=n;
  }
  ctx.putImageData(id,0,0);
}

function drawDecorations(W, H, acc, frame){
  // Corner circles
  const drawCircle = (x,y,r,col,lw,dash)=>{
    ctx.save();
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle=col; ctx.lineWidth=lw;
    if(dash) ctx.setLineDash(dash);
    ctx.stroke(); ctx.restore();
  };
  drawCircle(-30, 30, 120, acc, 14);
  drawCircle(W+30, H-30, 130, acc, 14);
  drawCircle(W+10, 80, 80, acc, 10);
  drawCircle(-10, H-100, 90, acc, 10);

  // Diagonal lines top-right
  ctx.save();
  ctx.strokeStyle = frame;
  ctx.lineWidth = 4;
  ctx.globalAlpha = 0.5;
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.moveTo(W-200+i*40, 0);
    ctx.lineTo(W+100, 300-i*40);
    ctx.stroke();
  }
  ctx.restore();

  // Dot matrix
  drawDots(W-160, 160, acc);
  drawDots(120, H-160, acc);

  // Diamond shapes corners
  drawDiamond(ctx, 100, H-300, 90, frame, 0.15);
  drawDiamond(ctx, W-100, 300, 90, frame, 0.15);

  // Geometric ring bottom-left
  drawCircle(80, H-80, 60, frame, 3);
  drawCircle(80, H-80, 40, frame, 2, [8,8]);
}

function drawDots(cx,cy,col){
  ctx.save();
  ctx.fillStyle = col;
  ctx.globalAlpha = 0.5;
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){
    ctx.beginPath();
    ctx.arc(cx+c*22, cy+r*22, 4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawDiamond(ctx,x,y,s,col,a){
  ctx.save();
  ctx.strokeStyle=col; ctx.lineWidth=3; ctx.globalAlpha=a;
  ctx.beginPath();
  ctx.moveTo(x,y-s); ctx.lineTo(x+s,y);
  ctx.lineTo(x,y+s); ctx.lineTo(x-s,y); ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function drawDoubleFrame(W, H, col){
  const pad=40, pad2=56;
  // outer
  roundRect(ctx, pad, pad, W-pad*2, H-pad*2, 12);
  ctx.strokeStyle=col; ctx.lineWidth=5; ctx.stroke();
  // inner thin
  roundRect(ctx, pad2, pad2, W-pad2*2, H-pad2*2, 8);
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.globalAlpha=0.5; ctx.stroke();
  ctx.globalAlpha=1;

  // corner accents
  const corners=[[70,70],[W-70,70],[70,H-70],[W-70,H-70]];
  const angles = [[0, Math.PI/2], [Math.PI/2, Math.PI], [Math.PI*1.5, Math.PI*2], [Math.PI, Math.PI*1.5]];
  corners.forEach(([cx,cy],i)=>{
    ctx.beginPath();
    ctx.arc(cx,cy,28, angles[i][0], angles[i][1]);
    ctx.strokeStyle=col; ctx.lineWidth=6; ctx.globalAlpha=1; ctx.stroke();
  });
}

function drawContentFrame(W, H, col){
  // logo placeholder box
  const bx = 120, by = 680, bw = W-240, bh = 500;
  ctx.save();
  ctx.strokeStyle = col;
  ctx.lineWidth = 3;
  ctx.setLineDash([16,10]);
  ctx.globalAlpha = 0.5;
  roundRect(ctx, bx, by, bw, bh, 12);
  ctx.stroke();
  ctx.restore();
}

function drawTexts(W, H, acc){
  const t1 = val('title1');
  const t2 = val('title2');
  const ac = val('accent');
  const tn = val('teamName');
  const num = val('teamNum');
  const sub = val('subtext');

  ctx.textAlign = 'center';

  // Title 1
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 130px "Barlow Condensed", sans-serif';
  ctx.fillText(t1, W/2, 320);

  // Title 2
  ctx.fillText(t2, W/2, 460);

  // Accent name
  ctx.fillStyle = acc;
  ctx.font = 'bold 110px "Barlow Condensed", sans-serif';
  ctx.fillText(ac, W/2, 600);

  // Logo placeholder text (only if no logo)
  if(!logoImg && checked('showLogoBox')){
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = 'bold 80px "Barlow Condensed", sans-serif';
    ctx.fillText('SPONSOR', W/2, 890);
    ctx.font = 'bold 80px "Barlow Condensed", sans-serif';
    ctx.fillText('LOGO', W/2, 980);
    ctx.font = '40px "Barlow Condensed", sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillText('PLACE YOUR LOGO HERE', W/2, 1060);
  }

  // Team name
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 100px "Barlow Condensed", sans-serif';
  ctx.fillText(tn, W/2, 1330);

  // Team number
  ctx.font = '600 70px "Barlow Condensed", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fillText(num, W/2, 1420);

  // Divider line
  ctx.beginPath();
  ctx.moveTo(W/2-200, 1480); ctx.lineTo(W/2+200, 1480);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2; ctx.setLineDash([]);
  ctx.stroke();

  // Sub text
  if(sub){
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = '700 46px "Barlow Condensed", sans-serif';
    ctx.letterSpacing = '4px';
    ctx.fillText(sub, W/2, 1860);
  }
}

// Draw FIRST logo SVG onto canvas at bottom
function drawFirstLogo(W, H) {
  if (!firstLogoImg) return;
  const lw = 260, lh = 100;
  ctx.save();
  ctx.globalAlpha = 0.95;
  ctx.drawImage(firstLogoImg, W/2 - lw/2, H - 260, lw, lh);
  ctx.restore();
}

function drawLogoArea(W, H, col){
  const bx = 120, by = 680, bw = W-240, bh = 500;
  const showBox = checked('showLogoBox');

  if(logoImg){
    const scale = parseInt(val('logoSize'))/100;
    const maxW = bw * 0.85 * scale;
    const maxH = bh * 0.8 * scale;
    let lw = logoImg.width, lh = logoImg.height;
    const ratio = Math.min(maxW/lw, maxH/lh);
    lw *= ratio; lh *= ratio;
    const lx = bx + (bw-lw)/2;
    const ly = by + (bh-lh)/2;
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 30;
    ctx.drawImage(logoImg, lx, ly, lw, lh);
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}
